services:
  db:
    image: postgres:16
    container_name: oiltech_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oiltech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oiltech_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-oiltech_digest}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oiltech} -d ${POSTGRES_DB:-oiltech_digest}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bootstrap:
    build: .
    container_name: oiltech_bootstrap
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oiltech}:${POSTGRES_PASSWORD:-oiltech_local_dev}@db:5432/${POSTGRES_DB:-oiltech_digest}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command:
      [
        "sh",
        "-c",
        "python -m oiltech_digest.cli init-db && python -m oiltech_digest.cli seed-sources && python -m oiltech_digest.cli seed-tags && python -m oiltech_digest.cli seed-scoring && (python -m oiltech_digest.cli apply-source-overrides || true)"
      ]
    restart: "no"

  app:
    build: .
    container_name: oiltech_app
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oiltech}:${POSTGRES_PASSWORD:-oiltech_local_dev}@db:5432/${POSTGRES_DB:-oiltech_digest}
      PYTHONUNBUFFERED: "1"
      BACKGROUND_JOB_INLINE: "0"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    build: .
    container_name: oiltech_worker
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oiltech}:${POSTGRES_PASSWORD:-oiltech_local_dev}@db:5432/${POSTGRES_DB:-oiltech_digest}
      PYTHONUNBUFFERED: "1"
      BACKGROUND_JOB_INLINE: "0"
      BACKGROUND_JOB_POLL_SECONDS: ${BACKGROUND_JOB_POLL_SECONDS:-2}
      BACKGROUND_JOB_STALE_MINUTES: ${BACKGROUND_JOB_STALE_MINUTES:-60}
      BACKGROUND_JOB_QUEUES: default,ai
      SKIP_BOOTSTRAP: "1"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command: ["python", "-m", "oiltech_digest.cli", "-v", "jobs-worker"]
    volumes:
      - exports:/app/exports
    restart: unless-stopped

  playwright-worker:
    build: .
    container_name: oiltech_playwright_worker
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oiltech}:${POSTGRES_PASSWORD:-oiltech_local_dev}@db:5432/${POSTGRES_DB:-oiltech_digest}
      PYTHONUNBUFFERED: "1"
      BACKGROUND_JOB_INLINE: "0"
      BACKGROUND_JOB_POLL_SECONDS: ${PLAYWRIGHT_JOB_POLL_SECONDS:-3}
      BACKGROUND_JOB_STALE_MINUTES: ${BACKGROUND_JOB_STALE_MINUTES:-60}
      BACKGROUND_JOB_QUEUES: playwright
      SKIP_BOOTSTRAP: "1"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command: ["python", "-m", "oiltech_digest.cli", "-v", "jobs-worker"]
    volumes:
      - exports:/app/exports
    restart: unless-stopped

  scheduler:
    build: .
    container_name: oiltech_scheduler
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oiltech}:${POSTGRES_PASSWORD:-oiltech_local_dev}@db:5432/${POSTGRES_DB:-oiltech_digest}
      PYTHONUNBUFFERED: "1"
      CYCLE_INTERVAL_SECONDS: ${CYCLE_INTERVAL_SECONDS:-21600}
      RUN_DISCOVER_ON_START: ${RUN_DISCOVER_ON_START:-1}
      DISCOVER_EVERY_CYCLES: ${DISCOVER_EVERY_CYCLES:-24}
      RUN_MAINTENANCE_ON_START: ${RUN_MAINTENANCE_ON_START:-1}
      MAINTENANCE_EVERY_CYCLES: ${MAINTENANCE_EVERY_CYCLES:-24}
      DISCOVER_TIMEOUT: ${DISCOVER_TIMEOUT:-4}
      DISCOVER_WORKERS: ${DISCOVER_WORKERS:-2}
      PARSE_WORKERS: ${PARSE_WORKERS:-3}
      FULL_TEXT_LIMIT: ${FULL_TEXT_LIMIT:-80}
      FULL_TEXT_MIN_CHARS: ${FULL_TEXT_MIN_CHARS:-800}
      AI_PROCESS_LIMIT: ${AI_PROCESS_LIMIT:-50}
      AI_OFFLINE: ${AI_OFFLINE:-0}
      SKIP_BOOTSTRAP: "1"
      HTTP_MIN_INTERVAL_SECONDS: ${HTTP_MIN_INTERVAL_SECONDS:-1.5}
      HTTP_JITTER_SECONDS: ${HTTP_JITTER_SECONDS:-0.4}
      HTTP_BLOCK_COOLDOWN_SECONDS: ${HTTP_BLOCK_COOLDOWN_SECONDS:-900}
      REQUEST_ARTICLE_LIMIT: ${REQUEST_ARTICLE_LIMIT:-6}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command: ["./scripts/docker-scheduler.sh"]
    volumes:
      - exports:/app/exports
    restart: unless-stopped

  docs:
    image: squidfunk/mkdocs-material:9
    container_name: oiltech_docs
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8000"
    volumes:
      - ./docs/help:/docs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/help/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oiltech}:${POSTGRES_PASSWORD:-oiltech_local_dev}@db:5432/${POSTGRES_DB:-oiltech_digest}
      PYTHONUNBUFFERED: "1"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command: ["python", "-m", "pytest"]
    volumes:
      - .:/app
      - exports:/app/exports
    profiles:
      - test

  caddy:
    image: caddy:2-alpine
    container_name: oiltech_caddy
    restart: unless-stopped
    depends_on:
      - app
      - docs
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  exports:
  caddy_data:
  caddy_config:
