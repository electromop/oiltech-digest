<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{issue_title}</title>
  <style>
    body {{
      margin: 0;
      background: #eef3f9;
      color: #0f172a;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
    }}
    .page {{
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }}
    .hero {{
      background: linear-gradient(145deg, #0b3b7a 0%, #0b1f44 100%);
      color: #fff;
      border-radius: 18px;
      padding: 28px 32px 32px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.18);
    }}
    .badge {{
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #f97316;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }}
    h1 {{
      margin: 18px 0 8px;
      font-size: 42px;
      line-height: 1.06;
    }}
    .subtitle {{
      font-size: 20px;
      color: rgba(255,255,255,.84);
    }}
    .intro {{
      margin-top: 22px;
      background: #fff;
      border: 1px solid #dbe5f1;
      border-radius: 16px;
      padding: 20px 22px;
    }}
    .section-title {{
      margin: 30px 0 14px;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #0b3b7a;
    }}
    .card {{
      background: #fff;
      border: 1px solid #dbe5f1;
      border-radius: 16px;
      padding: 20px 22px;
      margin-top: 12px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
    }}
    .category {{
      color: #0b3b7a;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }}
    .title {{
      font-size: 24px;
      line-height: 1.25;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 10px;
    }}
    .summary {{
      color: #334155;
      white-space: pre-line;
    }}
    .meta {{
      margin-top: 12px;
      color: #64748b;
      font-size: 14px;
    }}
    .link {{
      display: inline-block;
      margin-top: 14px;
      color: #ea580c;
      font-weight: 800;
      text-decoration: none;
    }}
    .footer {{
      margin-top: 28px;
      font-size: 14px;
      color: #475569;
      padding-top: 18px;
      border-top: 1px solid #dbe5f1;
    }}
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="badge">{hero_badge}</div>
      <h1>{hero_headline}</h1>
      <div class="subtitle">{hero_subtitle}</div>
    </div>
    <div class="intro">
      <strong>{issue_title}</strong><br>
      {issue_intro}
    </div>
    <div class="section-title">Тестовый экспорт дайджеста</div>
    {news_items}
    <div class="footer">
      <div>{footer_contact_text}</div>
      <div><strong>{footer_contact_email}</strong></div>
      <div style="margin-top:8px">{footer_note}</div>
    </div>
  </div>
</body>
</html>
