<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{issue_title}</title>
  <style>
    @page {{
      size: A4;
      margin: 0;
    }}

    body {{
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }}

    .digest-frame {{
      box-shadow: 0 12px 36px rgba(8, 33, 76, 0.10);
    }}

    .news-card {{
      break-inside: avoid;
      page-break-inside: avoid;
    }}

    .highlights-card {{
      break-inside: avoid;
      page-break-inside: avoid;
    }}

    .news-page {{
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 8px 0;
    }}

    .news-page-break {{
      page-break-before: always;
      break-before: page;
      padding-top: 10px;
    }}

    .news-section-title {{
      font-family:'GPN Din Condensed','GPN Din',Arial,Helvetica,sans-serif;
      font-size:30px;
      line-height:36px;
      color:#003da6;
      font-weight:bold;
      letter-spacing:.10em;
      text-transform:uppercase;
      margin:0 0 18px 0;
    }}

    .news-card-image {{
      display: block;
      width: 130px;
      height: 86px;
      object-fit: cover;
      border-radius: 6px;
      border: 0;
    }}

    .news-card-title {{
      font-family: 'GPN Din Condensed', 'GPN Din', Arial, Helvetica, sans-serif;
      font-size: 20px;
      line-height: 24px;
      color: #003da6;
      font-weight: bold;
      letter-spacing: .04em;
      text-transform: uppercase;
    }}

    .news-card-summary {{
      font-size: 13px;
      line-height: 18px;
      color: #333333;
      margin-top: 6px;
    }}

    .news-card-meta {{
      font-size: 11px;
      line-height: 16px;
      color: #68768f;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: bold;
    }}

    .intro-copy {{
      max-width: 500px;
    }}

    .highlights-label {{
      font-size: 11px;
      line-height: 14px;
      color: #262d3c;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-weight: bold;
    }}

    .footer-note {{
      color:#d6e4f9;
      font-size:12px;
      line-height:18px;
    }}

    .footer-note a {{
      color:#ffffff;
      text-decoration:underline;
    }}

    .news-card-tag {{
      display: inline-block;
      color: #003da6;
      font-size: 11px;
      line-height: 16px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: .06em;
    }}
  </style>
</head>
<body style="margin:0;padding:0;background:#F3F5F8;font-family:'GPN Din',Arial,Helvetica,sans-serif;color:#262d3c;">
  <div style="display:none;max-height:0;overflow:hidden;color:#F3F5F8;">{issue_preheader}</div>

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#F3F5F8;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table class="digest-frame" role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px;max-width:600px;background:#ffffff;">

          <!-- HERO: утверждённый баннер 600×360 (логотип ГАЗПРОМ НЕФТЬ, бейдж, заголовок
               и подзаголовок запечены в картинке). <img>, а не background — надёжно в Outlook. -->
          <tr>
            <td style="padding:0;margin:0;font-size:0;line-height:0;">
              <img src="{hero_img_src}" width="600" height="360" alt="{hero_alt}" style="display:block;width:600px;height:360px;border:0;outline:none;text-decoration:none;">
            </td>
          </tr>

          <!-- ВСТУПЛЕНИЕ -->
          <tr>
            <td style="padding:26px 36px 14px 36px;">
              <div class="intro-copy" style="font-size:16px;line-height:24px;color:#262d3c;">{issue_intro}</div>
            </td>
          </tr>

          <!-- ГЛАВНОЕ ЗА ПЕРИОД -->
          {highlights_section}

          <!-- НОВОСТИ -->
          <tr>
            <td style="padding:8px 36px 10px 36px;">
              {news_sections}
            </td>
          </tr>

          <!-- ФУТЕР: соцсети + контакт -->
          <tr>
            <td style="background:#003da6;padding:22px 36px 22px 36px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:14px;">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                      <tr>
                        {footer_socials_html}
                      </tr>
                    </table>
                  </td>
                </tr>
                <tr>
                  <td align="center" class="footer-note">
                    <span style="color:#ffffff;font-weight:bold;">{footer_contact_text}</span><br>
                    <a href="mailto:{footer_contact_email}">{footer_contact_email}</a> &middot; {footer_note}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
