<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{issue_title}</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#262d3c;">
  <div style="display:none;max-height:0;overflow:hidden;color:#f5f7fb;">{issue_preheader}</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f5f7fb;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px;max-width:600px;background:#ffffff;">
          <tr>
            <td style="padding:28px 36px 22px 36px;background:#ffffff;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="left" style="font-size:18px;line-height:20px;color:#003da6;font-weight:bold;">
                    ГАЗПРОМ НЕФТЬ <span style="display:inline-block;color:#003da6;margin-left:12px;">/ ЭНЕРГИЯ В ЛЮДЯХ</span>
                  </td>
                  <td align="right" style="font-size:14px;line-height:20px;color:#003da6;font-weight:bold;">БЛОК РАЗВИТИЯ БИЗНЕСА</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="background:#003da6;width:600px;height:300px;">
              <table role="presentation" width="600" height="300" cellspacing="0" cellpadding="0" border="0" style="width:600px;height:300px;background:linear-gradient(145deg,#003da6 0%,#001d50 100%);">
                <tr>
                  <td valign="top" style="padding:0 36px;">
                    <div style="display:inline-block;background:#e83d08;color:#ffffff;font-size:16px;line-height:20px;font-weight:bold;letter-spacing:.04em;padding:14px 34px;border-radius:0 0 12px 12px;">{hero_badge}</div>
                  </td>
                </tr>
                <tr>
                  <td valign="bottom" style="padding:0 36px 34px 36px;">
                    <div style="font-family:Arial,Helvetica,sans-serif;font-size:38px;line-height:44px;color:#ffffff;font-weight:bold;letter-spacing:.04em;text-transform:uppercase;">{hero_headline}</div>
                    <div style="font-size:21px;line-height:28px;color:#ffffff;margin-top:12px;">{hero_subtitle}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:26px 36px 18px 36px;">
              <div style="font-size:16px;line-height:24px;color:#262d3c;">{issue_intro}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 36px 10px 36px;">
              <div style="font-size:30px;line-height:36px;color:#003da6;font-weight:bold;letter-spacing:.10em;text-transform:uppercase;margin-bottom:16px;">НОВОСТИ</div>
              {news_items}
            </td>
          </tr>
          <tr>
            <td style="padding:22px 36px 30px 36px;background:#eef3fb;">
              <div style="font-size:14px;line-height:20px;color:#262d3c;">{footer_contact_text}</div>
              <div style="font-size:14px;line-height:20px;color:#003da6;font-weight:bold;margin-top:4px;">{footer_contact_email}</div>
              <div style="font-size:12px;line-height:18px;color:#697386;margin-top:12px;">{footer_note}</div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
