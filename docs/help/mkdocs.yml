site_name: OilTech Digest Docs
site_description: Документация пользователя и разработчика OilTech Digest
site_url: http://127.0.0.1/help/
docs_dir: content
use_directory_urls: true

theme:
  name: material
  language: ru
  logo: assets/signals-overview.png
  favicon: assets/signals-overview.png
  palette:
    - scheme: default
      primary: blue
      accent: cyan
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search:
      lang:
        - ru
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables

nav:
  - Обзор: index.md
  - Для пользователей:
      - user/index.md
  - Для разработчиков:
      - developer/index.md
